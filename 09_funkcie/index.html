<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funkcie - Ovládací panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎮 Ovládací panel - Funkcie</h1>
   

    <!-- SEKCIA 1: HOTOVÉ PRÍKLADY (ukážka pre žiakov) -->
    <section class="section">
      <h2>✅ Hotové príklady (pozri si kód)</h2>
      
      <button id="pozdravBtn">Pozdrav</button>
      <button id="zmenFarbuBtn">Zmeň farbu pozadia</button>
      
      <div id="vysledok1" class="vysledok"></div>
    </section>

    <!-- SEKCIA 2: POČÍTADLO (žiaci dopĺňajú) -->
    <section class="section">
      <h2>❌ Počítadlo - DOPLŇ FUNKCIE</h2>
      
      <div class="pocitadlo-display">
        <p>Aktuálna hodnota: <span id="pocitadlo">0</span></p>
      </div>
      
      <button id="zvysBtn">➕ Zvýš o 1</button>
      <button id="znizBtn">➖ Zníž o 1</button>
      <button id="resetBtn">🔄 Reset</button>
    </section>

    <!-- SEKCIA 3: ZMENA VEĽKOSTI PÍSMA (žiaci dopĺňajú) -->
    <section class="section">
      <h2>❌ Zmena veľkosti písma - DOPLŇ FUNKCIE</h2>
      
      <button id="zvacsBtn">📈 Zväčši font</button>
      <button id="zmensBtn">📉 Zmenši font</button>
      <button id="normalnyBtn">↔️ Normálny font</button>
      
      <div id="vysledokText" class="vysledok"></div>
    </section>

    <!-- SEKCIA 4: NÁHODNÉ ČÍSLO (žiaci dopĺňajú) -->
    <section class="section">
      <h2>❌ Generátor - DOPLŇ FUNKCIE</h2>
      
      <button id="nahodneCisloBtn">🎲 Náhodné číslo (1-100)</button>
      <button id="nahodnaFarbaBtn">🎨 Náhodná farba textu</button>
      
      <div id="vysledokNahodne" class="vysledok"></div>
    </section>

    

  <script src="script.js"></script>
</body>
</html>
